[project]
name = "template"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14,<3.15"
dependencies = [
    "adeu @ git+https://github.com/dealfluence/adeu.git",
    "asyncpg>=0.31.0",
    "httpx>=0.28.1",
    "markitdown[pdf, docx, pptx, outlook]",
    "meilisearch>=0.40.0",
    "openpyxl>=3.1.5",
    "pandas>=2.3.3",
    "pyperclip>=1.11.0",
    "python-docx>=1.2.0",
    "python-dotenv>=1.2.1",
    "rapidfuzz>=3.14.3",
    "requests>=2.32.0",
    "tabulate>=0.9.0",
    "textual>=6.9.0",
    "textual-fspicker>=0.6.0",
    "tiktoken>=0.8.0",
]

[project.scripts]
netdocs = "netdocs.__main__:main"

[tool.uv]
package = true

[tool.uv.workspace]
members = ["caption-cli"]

[tool.setuptools.packages.find]
include = ["netdocs*"]
